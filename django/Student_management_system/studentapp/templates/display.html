<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Students</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --border: #1e1e2e;
            --accent: #6ee7b7;
            --accent2: #38bdf8;
            --danger: #f87171;
            --text: #e2e8f0;
            --muted: #64748b;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 40px 20px;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(ellipse at 20% 20%, rgba(110,231,183,0.04) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 80%, rgba(56,189,248,0.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 36px;
            animation: fadeDown 0.5s ease;
        }

        .header h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(22px, 4vw, 32px);
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .btn-back {
            background: rgba(110,231,183,0.08);
            color: var(--accent);
            border: 1px solid rgba(110,231,183,0.2);
            padding: 10px 20px;
            border-radius: 10px;
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            transition: background 0.2s;
        }

        .btn-back:hover { background: rgba(110,231,183,0.15); }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            animation: fadeUp 0.5s ease;
        }

        .table-wrap { overflow-x: auto; }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead tr {
            border-bottom: 1px solid var(--border);
        }

        th {
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            padding: 10px 16px;
            text-align: left;
        }

        td {
            padding: 16px;
            font-size: 14px;
            border-bottom: 1px solid rgba(30,30,46,0.6);
        }

        tbody tr:hover { background: rgba(255,255,255,0.02); }

        .badge {
            background: rgba(56,189,248,0.1);
            color: var(--accent2);
            border: 1px solid rgba(56,189,248,0.2);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
        }

        .actions { display: flex; gap: 10px; }

        .btn-edit {
            background: rgba(110,231,183,0.08);
            color: var(--accent);
            border: 1px solid rgba(110,231,183,0.15);
            padding: 7px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            text-decoration: none;
            transition: background 0.2s;
        }

        .btn-edit:hover { background: rgba(110,231,183,0.15); }

        .btn-delete {
            background: rgba(248,113,113,0.08);
            color: var(--danger);
            border: 1px solid rgba(248,113,113,0.15);
            padding: 7px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            text-decoration: none;
            transition: background 0.2s;
        }

        .btn-delete:hover { background: rgba(248,113,113,0.15); }

        .empty {
            text-align: center;
            padding: 48px;
            color: var(--muted);
            font-size: 14px;
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <h1>All Students</h1>
        <a href="{% url 'index' %}" class="btn-back">← Add Student</a>
    </div>

    <div class="card">
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Age</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for s in students %}
                    <tr>
                        <td><span class="badge">{{ forloop.counter }}</span></td>
                        <td>{{ s.name }}</td>
                        <td>{{ s.email }}</td>
                        <td>{{ s.age }}</td>
                        <td>
                            <div class="actions">
                                <a href="{% url 'update' %}?id={{ s.id }}" class="btn-edit">✏️ Edit</a>
                                <a href="{% url 'delete' %}?id={{ s.id }}" class="btn-delete">🗑️ Delete</a>
                            </div>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="5" class="empty">No students found!</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

</div>
</body>
</html>
