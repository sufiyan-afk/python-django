<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Student</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --border: #1e1e2e;
            --accent: #6ee7b7;
            --accent2: #38bdf8;
            --text: #e2e8f0;
            --muted: #64748b;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(ellipse at 30% 40%, rgba(110,231,183,0.04) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 60%, rgba(56,189,248,0.04) 0%, transparent 50%);
            pointer-events: none;
        }

        .wrapper {
            width: 100%;
            max-width: 480px;
            position: relative;
            z-index: 1;
            animation: fadeUp 0.5s ease;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--muted);
            text-decoration: none;
            font-size: 13px;
            margin-bottom: 24px;
            transition: color 0.2s;
        }

        .back-link:hover { color: var(--accent); }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 36px;
        }

        .card-header {
            margin-bottom: 32px;
        }

        .card-header h2 {
            font-family: 'Syne', sans-serif;
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .card-header p {
            color: var(--muted);
            font-size: 13px;
            margin-top: 4px;
        }

        /* Message */
        .msg {
            background: rgba(110,231,183,0.08);
            border: 1px solid rgba(110,231,183,0.2);
            color: var(--accent);
            padding: 11px 16px;
            border-radius: 10px;
            margin-bottom: 24px;
            font-size: 13px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 13px 16px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(110,231,183,0.08);
        }

        .btn-update {
            width: 100%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #0a0a0f;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s;
            margin-top: 8px;
        }

        .btn-update:hover { opacity: 0.85; transform: translateY(-1px); }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="wrapper">

    <a href="{% url 'index' %}" class="back-link">← Back to Students</a>

    <div class="card">
        <div class="card-header">
            <h2>Update Student</h2>
            <p>Edit the details below and save</p>
        </div>

        {% if msg %}
        <div class="msg">✓ {{ msg }}</div>
        {% endif %}

        <form action="{% url 'update'%}?id={{student.id}}" method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" value="{{ student.name }}" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" value="{{ student.email }}" required>
            </div>
            <div class="form-group">
                <label>Age</label>
                <input type="number" name="age" value="{{ student.age }}" required>
            </div>
            <button type="submit" class="btn-update">Save Changes →</button>
        </form>
    </div>

</div>
</body>
</html>
