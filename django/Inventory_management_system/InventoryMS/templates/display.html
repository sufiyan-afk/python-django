<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f1f5f9;
        }

        .dashboard-card{
            border:none;
            border-radius:25px;
            box-shadow:0 10px 30px rgba(0,0,0,0.08);
        }

        .badge-id{
            background:#0f172a;
            color:white;
            border-radius:12px;
            padding:8px 12px;
        }

    </style>
</head>
<body>

<div class="container py-5">

    <div class="card dashboard-card p-4">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <div>
                <h2>Products Dashboard</h2>
                <p class="text-muted">
                    Manage your ecommerce inventory
                </p>
            </div>

            <a href="{% url 'index' %}"
               class="btn btn-dark">
                Add Product
            </a>

        </div>

        <div class="table-responsive">

            <table class="table table-hover align-middle">

                <thead class="table-dark">

                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Quantity</th>
                        <th>Actions</th>
                    </tr>

                </thead>

                <tbody>
                    {% for p in products %}
                    <tr>
                        <td><span class="badge bg-dark">{{forloop.counter}}</span></td>
                        
                        <td>{{p.name}}</td>
                        <td>{{p.category}}</td>
                        <td>{{p.price}}</td>
                        <td>{{p.quantity}}</td>

                        <td>
                            <a href="{% url 'update' %}?id={{p.id}}" class="btn btn-warning btn-sm">Edit</a>
                            <a href="{% url 'delete' %}?id={{p.id}}" class="btn btn-danger btn-sm">Delete</a>
                        </td>

                    </tr>

                    <tr>{% empty %}</tr>
                    {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
