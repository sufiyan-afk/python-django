<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InventoryMS - Register Product</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: linear-gradient(to right,#eef2ff,#f8fafc);
            min-height:100vh;
        }

        .form-card{
            border:none;
            border-radius:25px;
            background:white;
            box-shadow:0 10px 30px rgba(0,0,0,0.08);
        }

        .heading{
            font-weight:700;
            color:#1e293b;
        }

        .sub-heading{
            color:#64748b;
            font-size:14px;
        }

        .form-control{
            height:50px;
            border-radius:14px;
        }

        .btn-custom{
            height:50px;
            border-radius:14px;
            font-weight:600;
        }

    </style>
</head>
<body>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card form-card p-5">

                <h2 class="heading text-center">
                    Register Product
                </h2>

                <p class="sub-heading text-center mb-4">
                    Add products to your ecommerce inventory
                </p>

                <form action="{% url 'index' %}" method="post">
                    {%csrf_token%}
                    <div class="mb-3">
                        <label class="form-label">Product Name</label>
                        <input type="text"
                               class="form-control"
                               placeholder="Enter product name"
                               name="name">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Category</label>
                        <input type="text"
                               class="form-control"
                               placeholder="Enter category"
                               name="category">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Price</label>
                        <input type="number"
                               class="form-control"
                               placeholder="Enter product price"
                               name="price">
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Quantity</label>
                        <input type="number"
                               class="form-control"
                               placeholder="Enter quantity"
                               name="quantity">
                    </div>

                    <div class="d-flex gap-2">

                        <button type="submit"
                                class="btn btn-primary btn-custom w-100">
                            Register Product
                        </button>

                        <a href="{% url 'display' %}"
                           class="btn btn-dark btn-custom w-100">
                            View Products
                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
