<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Product</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:linear-gradient(to right,#eef2ff,#f8fafc);
            min-height:100vh;
        }

        .update-card{
            border:none;
            border-radius:25px;
            box-shadow:0 10px 30px rgba(0,0,0,0.08);
        }

        .form-control{
            height:50px;
            border-radius:14px;
        }

        .btn-update{
            height:50px;
            border-radius:14px;
            font-weight:600;
        }

    </style>
</head>
<body>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card update-card p-5">

                <h2 class="text-center mb-4">
                    Update Product
                </h2>

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">
                            Product Name
                        </label>

                        <input type="text"
                               class="form-control"
                               name="name"
                               value="{{products.name}}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Category
                        </label>

                        <input type="text"
                               class="form-control"
                               name="category"
                               value="{{products.category}}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Price
                        </label>

                        <input type="number"
                               class="form-control"
                               name="price"
                               value="{{products.price}}">
                    </div>

                    <div class="mb-4">
                        <label class="form-label">
                            Quantity
                        </label>

                        <input type="number"
                               class="form-control"
                               name="quantity"
                               value="{{products.quantity}}">
                    </div>

                    <button type="submit"
                            class="btn btn-success btn-update w-100">
                        Update Product
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
