{% extends 'accounts/base.html' %}
{% block title %}Login — MyApp{% endblock %}

{% block extra_css %}
<style>
  .auth-wrap {
    min-height: calc(100vh - 130px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    position: relative;
    overflow: hidden;
  }
  .auth-wrap::before, .auth-wrap::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    filter: blur(90px);
    opacity: 0.12;
    pointer-events: none;
  }
  .auth-wrap::before {
    width: 450px; height: 450px;
    background: #6c63ff;
    bottom: -150px; right: -100px;
  }
  .auth-wrap::after {
    width: 300px; height: 300px;
    background: #ff6b6b;
    top: -80px; left: -80px;
  }

  .auth-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem;
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.4s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .auth-header { margin-bottom: 2rem; }
  .auth-header h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.8rem;
    margin-bottom: 0.4rem;
    background: linear-gradient(135deg, var(--text) 0%, var(--muted) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .auth-header p { color: var(--muted); font-size: 0.9rem; }

  .form-group { margin-bottom: 1.2rem; }
  .form-label-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.5rem;
  }
  .form-group label {
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .forgot-link {
    font-size: 0.8rem;
    color: var(--accent);
    text-decoration: none;
  }
  .forgot-link:hover { text-decoration: underline; }

  .form-group input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }
  .form-group input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
  }
  .form-group input::placeholder { color: var(--muted); opacity: 0.6; }

  .password-wrap { position: relative; }
  .toggle-pw {
    position: absolute;
    right: 1rem; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    color: var(--muted); cursor: pointer;
    font-size: 1rem; padding: 0;
    transition: color 0.2s;
  }
  .toggle-pw:hover { color: var(--text); }

  .btn-primary {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0.85rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.2s;
    margin-top: 0.5rem;
  }
  .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .auth-footer {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 0.875rem;
    color: var(--muted);
  }
  .auth-footer a { color: var(--accent); text-decoration: none; font-weight: 500; }
  .auth-footer a:hover { text-decoration: underline; }

  .shake { animation: shake 0.4s ease; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%       { transform: translateX(-8px); }
    40%       { transform: translateX(8px); }
    60%       { transform: translateX(-5px); }
    80%       { transform: translateX(5px); }
  }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card" id="authCard">

    <div class="auth-header">
      <h1>Welcome Back</h1>
      <p>Login to access your dashboard</p>
    </div>

    <form method="POST" action="{% url 'login' %}">
      {% csrf_token %}

      <div class="form-group">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Your username"
          required
          autocomplete="username"
        />
      </div>

      <div class="form-group">
        <div class="form-label-row">
          <label for="password">Password</label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>
        <div class="password-wrap">
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Your password"
            required
            autocomplete="current-password"
          />
          <button type="button" class="toggle-pw" onclick="togglePassword()">👁</button>
        </div>
      </div>

      <button type="submit" class="btn-primary">Login →</button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="{% url 'register' %}">Register now</a>
    </div>

  </div>
</div>

<script>
  function togglePassword() {
    const pw = document.getElementById('password');
    pw.type = pw.type === 'password' ? 'text' : 'password';
  }

  window.addEventListener('DOMContentLoaded', () => {
    const hasError = document.querySelector('.msg.error');
    if (hasError) {
      document.getElementById('authCard').classList.add('shake');
    }
  });
</script>
{% endblock %}
