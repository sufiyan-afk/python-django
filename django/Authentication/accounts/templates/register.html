{% extends 'accounts/base.html' %}
{% block title %}Register — MyApp{% endblock %}

{% block extra_css %}
<style>
  .auth-wrap {
    min-height: calc(100vh - 130px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    position: relative;
    overflow: hidden;
  }
  .auth-wrap::before, .auth-wrap::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.15;
    pointer-events: none;
  }
  .auth-wrap::before {
    width: 400px; height: 400px;
    background: var(--accent);
    top: -100px; left: -100px;
  }
  .auth-wrap::after {
    width: 300px; height: 300px;
    background: var(--accent2);
    bottom: -80px; right: -80px;
  }

  .auth-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem;
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.4s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .auth-header { margin-bottom: 2rem; }
  .auth-header h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.8rem;
    margin-bottom: 0.4rem;
    background: linear-gradient(135deg, var(--text) 0%, var(--muted) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .auth-header p { color: var(--muted); font-size: 0.9rem; }

  .form-group { margin-bottom: 1.2rem; }
  .form-group label {
    display: block;
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .form-group input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }
  .form-group input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
  }
  .form-group input::placeholder { color: var(--muted); opacity: 0.6; }

  .btn-primary {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0.85rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.2s;
    margin-top: 0.5rem;
  }
  .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .auth-footer {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 0.875rem;
    color: var(--muted);
  }
  .auth-footer a { color: var(--accent); text-decoration: none; font-weight: 500; }
  .auth-footer a:hover { text-decoration: underline; }

  .strength-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 0.5rem;
    overflow: hidden;
  }
  .strength-fill {
    height: 100%;
    width: 0%;
    border-radius: 2px;
    transition: width 0.3s, background 0.3s;
  }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">

    <div class="auth-header">
      <h1>Create Account</h1>
      <p>Join us — it only takes a minute</p>
    </div>

    <form method="POST" action="">
      {% csrf_token %}

      <div class="form-group">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="e.g. sufiyan_dev"
          required
          autocomplete="username"
        />
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="you@example.com"
          required
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Min. 8 characters"
          required
          autocomplete="new-password"
          oninput="checkStrength(this.value)"
        />
        <div class="strength-bar">
          <div class="strength-fill" id="strengthFill"></div>
        </div>
      </div>

      <div class="form-group">
        <label for="password2">Confirm Password</label>
        <input
          type="password"
          id="password2"
          name="password2"
          placeholder="Re-enter password"
          required
          autocomplete="new-password"
        />
      </div>

      <button type="submit" class="btn-primary">Create Account →</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="{% url 'login' %}">Login here</a>
    </div>

  </div>
</div>

<script>
  function checkStrength(val) {
    const fill = document.getElementById('strengthFill');
    let score = 0;
    if (val.length >= 8) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;

    const colors = ['#f87171', '#fb923c', '#facc15', '#4ade80'];
    const widths = ['25%', '50%', '75%', '100%'];
    fill.style.width = score ? widths[score - 1] : '0%';
    fill.style.background = score ? colors[score - 1] : '';
  }
</script>
{% endblock %}
