<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}MyApp{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0f;
      --surface:  #13131a;
      --border:   #222230;
      --accent:   #6c63ff;
      --accent2:  #ff6b6b;
      --text:     #e8e8f0;
      --muted:    #7070a0;
      --success:  #4ade80;
      --error:    #f87171;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.3rem;
      color: var(--accent);
      letter-spacing: -0.5px;
      text-decoration: none;
    }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      margin-left: 1.5rem;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }
    .nav-links .btn-nav {
      background: var(--accent);
      color: #fff;
      padding: 0.4rem 1rem;
      border-radius: 6px;
      transition: opacity 0.2s;
    }
    .nav-links .btn-nav:hover { opacity: 0.85; color: #fff; }

    .messages-wrap {
      max-width: 420px;
      margin: 1rem auto 0;
      padding: 0 1rem;
    }
    .msg {
      padding: 0.65rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
      animation: slideIn 0.3s ease;
    }
    .msg.error   { background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.3); color: var(--error); }
    .msg.success { background: rgba(74,222,128,0.10);  border: 1px solid rgba(74,222,128,0.3);  color: var(--success); }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    main { flex: 1; }

    footer {
      text-align: center;
      padding: 1.5rem;
      color: var(--muted);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
    }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>

<nav>
  <a class="nav-logo" href="/">⬡ MyApp</a>
  <div class="nav-links">
    {% if request.user.is_authenticated %}
      <a href="{% url 'dashboard' %}">Dashboard</a>
      <a href="{% url 'logout' %}" class="btn-nav">Logout</a>
    {% else %}
      <a href="{% url 'login' %}">Login</a>
      <a href="{% url 'register' %}" class="btn-nav">Register</a>
    {% endif %}
  </div>
</nav>

{% if messages %}
<div class="messages-wrap">
  {% for msg in messages %}
    <div class="msg {{ msg.tags }}">{{ msg }}</div>
  {% endfor %}
</div>
{% endif %}

<main>
  {% block content %}{% endblock %}
</main>

<footer>Built with Django · Authentication System</footer>

</body>
</html>
