<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Record System</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-color: #f5f7fb;
        }

        .form-card{
            margin-top: 60px;
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .heading{
            font-weight: bold;
            color: #2c3e50;
        }

        .btn-custom{
            width: 100%;
            padding: 10px;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card form-card p-4">

                <h2 class="text-center heading mb-4">
                    Employee Registration
                </h2>

                <span class="text-success">{{msg}}</span>

                <form action="" method="post">
                    {% csrf_token %}

                    <div class="d-flex gap-2">
                        <button class="btn btn-primary w-100">Register Employee</button>
                        <a href="{% url 'display' %}" class="btn btn-dark w-100">
                            view Employee
                        </a>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">
                            Employee Name
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            name="name"
                            placeholder="Enter employee name"
                            
                        >
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Email
                        </label>

                        <input
                            type="email"
                            class="form-control"
                            name="email"
                            placeholder="Enter email"
                        >
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Department
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            name="department"
                            placeholder="Enter department"
                        >
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Salary
                        </label>

                        <input
                            type="number"
                            class="form-control"
                            name="salary"
                            placeholder="Enter salary"
                        >
                    </div>

                    <button class="btn btn-dark btn-custom">
                        Add Employee
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
