<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Employee</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background-color: #f5f7fb;
        }

        .form-card{
            margin-top: 60px;
            border: none;
            border-radius: 15px;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.08);
        }

        .heading{
            font-weight: bold;
            color: #2c3e50;
        }

        .btn-custom{
            width: 100%;
        }

    </style>

</head>
<body>

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card form-card p-4">

                <h2 class="text-center heading mb-4">
                    Update Employee
                </h2>

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label">
                            Employee Name
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            name="name"
                            value="{{employee.name}}"
                        >

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Email
                        </label>

                        <input
                            type="email"
                            class="form-control"
                            name="email"
                            value="{{employee.email}}"
                        >

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Department
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            name="department"
                            value="{{employee.department}}"
                        >

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Salary
                        </label>

                        <input
                            type="number"
                            class="form-control"
                            name="salary"
                            value="{{employee.salary}}"
                        >

                    </div>

                    <button class="btn btn-dark btn-custom">
                        Update Employee
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
