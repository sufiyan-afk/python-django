<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background-color: #f5f7fb;
        }

        .form-card{
            margin-top: 60px;
            border: none;
            border-radius: 15px;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.08);
        }

        .heading{
            font-weight: bold;
            color: #2c3e50;
        }

    </style>

</head>
<body>

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card form-card p-4">

                <h2 class="text-center heading mb-4">
                    Book Registration
                </h2>

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Book Title</label>
                        <input type="text" class="form-control" placeholder="Enter book title" name="title">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Author Name</label>
                        <input type="text" class="form-control" placeholder="Enter author name" name="author">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Genre</label>
                        <input type="text" class="form-control" placeholder="Enter genre" name="genre">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Price</label>
                        <input type="number" class="form-control" placeholder="Enter price" name="price">
                    </div>

                    <div class="d-flex gap-2">

                        <button class="btn btn-primary w-100">
                            Register Book
                        </button>

                        <a href="{% url 'display' %}" class="btn btn-dark w-100">View Books</a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
