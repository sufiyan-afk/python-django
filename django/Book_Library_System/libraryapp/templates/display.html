<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Records</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background-color: #f5f7fb;
        }

        .table-card{
            margin-top: 50px;
            border-radius: 15px;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.08);
            border: none;
        }

    </style>

</head>
<body>

<div class="container">

    <div class="card table-card p-4">

        <div class="d-flex justify-content-between mb-4">

            <h2>Book Records</h2>

            <a href="{% url 'index' %}" class="btn btn-dark w-50"> Add books</a>


        </div>

        <table class="table table-hover">

            <thead class="table-dark">

                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Author</th>
                    <th>Genre</th>
                    <th>Price</th>
                    <th>Actions</th>
                </tr>

            </thead>

            <tbody>

                {% for b in books %}
                <tr>
                    <td><span class="badge bg-dark">{{ forloop.counter }}</span></td>
                    <td>{{b.title}}</td>
                    <td>{{b.author}}</td>
                    <td>{{b.genre}}</td>
                    <td>{{b.price}}</td>
                    <td>
                        <a href="{% url 'update' %}?id={{ b.id }}" class="btn btn-warning btn-sm"> Edit</a>
                        <a href="{% url 'delete' %}?id={{ b.id }}" class="btn btn-danger btn-sm">Delete</a>
                    </td>
                </tr>

                <tr>
                    {% empty %}
                </tr>
                {% endfor %}`
            </tbody>

        </table>

    </div>

</div>

</body>
</html>
