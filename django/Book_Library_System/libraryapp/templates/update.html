<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Book</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background-color: #f5f7fb;
        }

        .form-card{
            margin-top: 60px;
            border-radius: 15px;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.08);
            border: none;
        }

    </style>

</head>
<body>

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card form-card p-4">

                <h2 class="text-center mb-4">
                    Update Book
                </h2>

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Book Title</label>
                        <input type="text" class="form-control" name="title" value="{{books.title}}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Author Name</label>
                        <input type="text" class="form-control" name="author" value="{{books.author}}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Genre</label>
                        <input type="text" class="form-control" name="genre" value="{{books.genre}}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Price</label>
                        <input type="number" class="form-control" name="price" value="{{books.price}}">
                    </div>

                    <button class="btn btn-dark w-100">
                        Update Book
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
