<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Data </title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">Student Details
                    <a href="{%url 'index'%}" class="btn btn-danger ">Add student</a>
                </h3>
            </div>

            <div class="card-body">
                <table class="table table-bordered table-striped table-hover text-center">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Age</th>
                            <th colspan="2">Action</th>
                        </tr>
                    </thead>

                    <tbody>

                        {%for st in students%}
                        <tr>
                            <td>{{st.id}}</td>
                            <td>{{st.name}}</td>
                            <td>{{st.email}}</td>
                            <td>{{st.age}}</td>
                            <td><a href="{%url 'delete'%}?id={{st.id}}" class="btn btn-danger">Delete</a></td>
                            <td><a href="{% url 'update' %}?id={{st.id }}" class="btn btn-primary">Update</a></td>
                        </tr>
                        {%endfor%}
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</body>

</html>
