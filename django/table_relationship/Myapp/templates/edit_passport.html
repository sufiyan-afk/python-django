<!DOCTYPE html>
<html>
<head>
    <title>Edit Passport</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5" style="max-width:500px">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">Edit Passport</div>
        <div class="card-body">
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Person Name</label>
                    <input type="text" name="name" class="form-control" value="{{ passport.person.name }}">
                </div>
                <div class="mb-3">
                    <label class="form-label">Country</label>
                    <input type="text" name="country" class="form-control" value="{{ passport.country }}">
                </div>
                <div class="mb-3">
                    <label class="form-label">Passport ID</label>
                    <input type="text" name="pid" class="form-control" value="{{ passport.pid }}">
                </div>
                <button class="btn btn-primary">Update</button>
                <a href="{% url 'home' %}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
