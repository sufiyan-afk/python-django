<!DOCTYPE html>
<html>
<head>
    <title>Edit Author</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5" style="max-width:500px">
    <div class="card shadow">
        <div class="card-header bg-dark text-white">Edit Author</div>
        <div class="card-body">
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Author Name</label>
                    <input type="text" name="author_name" class="form-control" value="{{ author.name }}">
                </div>
                <div class="mb-3">
                    <label class="form-label">Books</label>
                    <select multiple name="books" class="form-select">
                        {% for book in books %}
                        <!-- jo books pehle se assign thi woh selected dikhegi -->
                        <option value="{{ book.id }}" {% if book in author.book.all %}selected{% endif %}>
                            {{ book.name }}
                        </option>
                        {% endfor %}
                    </select>
                    <small class="text-muted">Hold CTRL to select multiple</small>
                </div>
                <button class="btn btn-dark">Update</button>
                <a href="{% url 'home' %}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
