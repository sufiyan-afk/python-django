<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Review Form</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">

            <div class="col-md-6">
                <div class="card shadow p-4">

                    <h2 class="text-center mb-4">
                        Movie Review Form
                    </h2>

                    <form method="POST">

                        <!-- Movie Name -->
                        <div class="mb-3">
                            <label class="form-label">
                                Movie Name
                            </label>

                            <input
                                type="text"
                                class="form-control"
                                placeholder="Enter movie name"
                            >
                        </div>

                        <!-- Hero Name -->
                        <div class="mb-3">
                            <label class="form-label">
                                Hero Name
                            </label>

                            <input
                                type="text"
                                class="form-control"
                                placeholder="Enter hero name"
                            >
                        </div>

                        <!-- Rating -->
                        <div class="mb-3">
                            <label class="form-label">
                                Rating
                            </label>

                            <input
                                type="number"
                                class="form-control"
                                placeholder="Enter movie rating"
                            >
                        </div>

                        <!-- Review -->
                        <div class="mb-3">
                            <label class="form-label">
                                Review
                            </label>

                            <textarea
                                class="form-control"
                                rows="4"
                                placeholder="Write your review here">
                            </textarea>
                        </div>

                        <!-- Submit Button -->
                        <div class="d-grid">
                            <button
                                type="submit"
                                class="btn btn-primary">
                                Submit Review
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>

</body>
</html>
