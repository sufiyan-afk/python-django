<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bookmytrip</title>
    <style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body{
        background: linear-gradient(to right, #ff4b5c, #ff6b81);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

    form{
        background: white;
        width: 100%;
        max-width: 450px;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    form div{
        margin-bottom: 20px;
    }

    label{
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
        color: #333;
    }

    input,
    select{
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 15px;
        transition: 0.3s;
    }

    input:focus,
    select:focus{
        border-color: #ff4b5c;
        outline: none;
        box-shadow: 0 0 5px rgba(255,75,92,0.5);
    }

    p{
        margin-bottom: 10px;
        font-weight: bold;
        color: #333;
    }

    /* radio buttons */
    input[type="radio"]{
        width: auto;
        margin-right: 5px;
    }

    button{
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: #ff4b5c;
        color: white;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover{
        background: #e63b4d;
        transform: scale(1.02);
    }

    @media(max-width: 500px){
        form{
            padding: 20px;
        }
    }
</style>
</head>
<body>
    <form action="bookmytrip.com">
        <div>
            <label for="name" >Name</label>
            <input id = "name" type="text" name="bookmytrip" placeholder="enter your name" required>
        </div>

        <div>
            <label for="phonenumber">Phone no</label>
            <input id = "phone number" type="tel" name="bookmytrip" placeholder="phone number">
        </div>

        <div>
            <label for="email">Email</label>
            <input id="email" type="email" name="bookmytrip" placeholder="enter your email" required>
        </div>

        <div>
            <label for="location">Location</label>
            <select id="location">
                <option value="manali - ladakh">manali to ladakh</option>
                <option value="kutch - bhuj">kutch - bhuj</option>
                <option value="agra - delhi">agra - delhi</option>
            </select>
        </div>

        <div>
            <p>package</p>
            <input id="normal" type="radio"  value="basic" >
            <label for="normal">Normal ($500/person)</label>
            
            <input type="radio" id="premium" value="premium" >
            <label for="premium">Premium ($2000/person)</label>
        </div>

        <div>
            <p>payment mode</p>
            <input id = "upi" type="radio"  value="upi">
            <label for="upi">UPI</label>

            <input id = "credit card" type="radio"  value="credit card">
            <label for="credit card"> Creditcard / netbanking</label>
        </div>

        <div>
            <button type="submit">Submit</button>
        </div>
    </form>
</body>
</html>
